# Geral
baseURL = "https://millenial-idoso.vercel.app/"
languageCode = "pt-br"
title = "Millennial Idoso"
defaultContentLanguage = "pt-br"

# Build
[minify]
  minifyOutput = true

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

# Módulos
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
  [[module.imports]]
    path = "github.com/babeneso/hugo-neso"

# Markdown
[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      wrapStandAloneImageWithinParagraph = false
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

# Parâmetros do site
[params]
  description = "Um blog sobre tecnologia, cultura e a vida de quem cresceu entre dois mundos."
  author = "Millennial Idoso"

# Menus
[[menus.main]]
  name = "Início"
  url = "/"
  weight = 1

[[menus.main]]
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menus.main]]
  name = "Sobre"
  url = "/sobre/"
  weight = 3
